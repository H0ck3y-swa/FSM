<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FAA Terminal Strip Template</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #fff; font-family: "Courier New", monospace; }
  .page { padding: 0.25in; }
  .strip {
    width: 8in;
    height: 1in;
    border: 2px solid #000;
    display: flex;
    margin: 0 auto;
    overflow: hidden;
  }
  .left {
    width: 2.35in;
    border-right: 2px solid #000;
    display: grid;
    grid-template-columns: 0.75in 1fr;
    grid-template-rows: repeat(4, 0.25in);
  }
  .mid1 {
    width: 0.95in;
    border-right: 2px solid #000;
    display: grid;
    grid-template-rows: repeat(3, 0.3333in);
  }
  .mid2 {
    width: 1.05in;
    border-right: 2px solid #000;
    display: grid;
    grid-template-rows: repeat(3, 0.3333in);
  }
  .mid3 {
    width: 2.55in;
    border-right: 2px solid #000;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 0.5in 0.5in;
  }
  .right {
    width: 1.1in;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 0.3333in);
  }
  .cell {
    border-right: 2px solid #000;
    border-bottom: 2px solid #000;
    padding: 1px 4px;
    font-size: 12px;
    line-height: 1;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
  }
  .left .cell:nth-child(2n) { border-right: 0; }
  .left .cell:nth-last-child(-n+2) { border-bottom: 0; }
  .mid1 .cell:last-child,
  .mid2 .cell:last-child,
  .right .cell:nth-last-child(-n+3) { border-bottom: 0; }
  .mid3 .cell:nth-child(2n) { border-right: 0; }
  .mid3 .cell:nth-last-child(-n+2) { border-bottom: 0; }
  .right .cell:nth-child(3n) { border-right: 0; }
  .label { font-size: 13px; }
</style>
</head>
<body>
<div class="page">
  <div class="strip">
    <div class="left">
      <div class="cell"><span class="label">1</span></div>
      <div class="cell"><span class="label">2A</span></div>
      <div class="cell"><span class="label">2</span></div>
      <div class="cell"></div>
      <div class="cell"><span class="label">3</span></div>
      <div class="cell"></div>
      <div class="cell"><span class="label">4</span></div>
      <div class="cell"></div>
    </div>
    <div class="mid1">
      <div class="cell"><span class="label">5</span></div>
      <div class="cell"><span class="label">6</span></div>
      <div class="cell"><span class="label">7</span></div>
    </div>
    <div class="mid2">
      <div class="cell"><span class="label">8</span></div>
      <div class="cell"><span class="label">8A</span></div>
      <div class="cell"><span class="label">8B</span></div>
    </div>
    <div class="mid3">
      <div class="cell"><span class="label">9</span></div>
      <div class="cell"><span class="label">9B</span></div>
      <div class="cell"><span class="label">9A</span></div>
      <div class="cell"><span class="label">9C</span></div>
    </div>
    <div class="right">
      <div class="cell"><span class="label">10</span></div>
      <div class="cell"><span class="label">11</span></div>
      <div class="cell"><span class="label">12</span></div>
      <div class="cell"><span class="label">13</span></div>
      <div class="cell"><span class="label">14</span></div>
      <div class="cell"><span class="label">15</span></div>
      <div class="cell"><span class="label">16</span></div>
      <div class="cell"><span class="label">17</span></div>
      <div class="cell"><span class="label">18</span></div>
    </div>
  </div>
</div>
</body>
</html>
