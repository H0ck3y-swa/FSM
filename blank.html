<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FAA Standard Strip Template</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #fff;
    font-family: "Courier New", monospace;
  }
  .page {
    padding: 0.25in;
  }
  .strip {
    width: 8in;
    height: 1in;
    border: 2px solid #000;
    display: grid;
    grid-template-columns: 2.05in 0.95in 1.35in 3.65in;
    margin: 0 auto;
  }
  .block {
    border-right: 2px solid #000;
    position: relative;
  }
  .block:last-child {
    border-right: 0;
  }
  .left {
    display: grid;
    grid-template-columns: 0.7in 1fr;
    grid-template-rows: repeat(4, 0.25in);
  }
  .left .cell {
    border-right: 2px solid #000;
    border-bottom: 2px solid #000;
    padding: 1px 4px;
    font-size: 12px;
    line-height: 1;
  }
  .left .cell:nth-child(2n) {
    border-right: 0;
  }
  .left .cell:nth-last-child(-n+2) {
    border-bottom: 0;
  }
  .mid1 {
    display: grid;
    grid-template-rows: repeat(3, 0.333in);
  }
  .mid1 .cell,
  .mid2 .cell,
  .right .cell {
    border-bottom: 2px solid #000;
    padding: 1px 4px;
    font-size: 12px;
    line-height: 1;
  }
  .mid1 .cell:last-child,
  .mid2 .cell:last-child,
  .right .cell:nth-last-child(-n+3) {
    border-bottom: 0;
  }
  .mid2 {
    display: grid;
    grid-template-rows: repeat(3, 0.333in);
  }
  .right {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 0.333in);
  }
  .right .cell {
    border-right: 2px solid #000;
  }
  .right .cell:nth-child(3n) {
    border-right: 0;
  }
  .label {
    display: inline-block;
    font-size: 13px;
    margin-top: 0;
  }
</style>
</head>
<body>
<div class="page">
  <div class="strip">
    <div class="block left">
      <div class="cell">1</div>
      <div class="cell">2A</div>
      <div class="cell">2</div>
      <div class="cell"></div>
      <div class="cell">3</div>
      <div class="cell"></div>
      <div class="cell">4</div>
      <div class="cell"></div>
    </div>

    <div class="block mid1">
      <div class="cell">5</div>
      <div class="cell">6</div>
      <div class="cell">7</div>
    </div>

    <div class="block mid2">
      <div class="cell">8</div>
      <div class="cell">8A</div>
      <div class="cell">8B</div>
    </div>

    <div class="block right">
      <div class="cell">9</div>
      <div class="cell"></div>
      <div class="cell">9B</div>
      <div class="cell">9A</div>
      <div class="cell"></div>
      <div class="cell">9C</div>
      <div class="cell">10</div>
      <div class="cell">11</div>
      <div class="cell">12</div>
      <div class="cell">13</div>
      <div class="cell">14</div>
      <div class="cell">15</div>
      <div class="cell">16</div>
      <div class="cell">17</div>
      <div class="cell">18</div>
    </div>
  </div>
</div>
</body>
</html>
